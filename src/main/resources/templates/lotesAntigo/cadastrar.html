<!DOCTYPE html>
<html lang="pt-BR" layout:decorate="~{layout/layoutpadrao}" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>Cadastrar Lote</title>
</head>

<body>
  <!-- conteudo principal -->
  <main layout:fragment="conteudo" th:fragment="formulario" id="main" class="flex flex-col align-middle w-full m-10">

    <h1 class="ms-16 text-xl md:text-2xl">Cadastro de Lote</h1>

    <form th:hx-post="@{/lote/cadastrar}" th:object="${loteDTOInput}" class="w-2/3 mt-5 ms-16">

      <div class="flex">
        <div class="flex-1 mr-10">
          <div th:replace="~{components/forms :: inputData(
            textoLabel='Validade', 
            nomeAtributo='validade',
            isValidado=true)}"></div>
        </div>
        <div class="flex-1">
          <div th:replace="~{components/forms :: inputBuscavel(
                textoLabel='Vacina',
                nomeAtributo='vacina',
                valorAtributo=${loteDTOInput.vacina != null ? loteDTOInput.vacina.codigo : -1},
                textoAtributo=${loteDTOInput.vacina != null ? loteDTOInput.vacina.nome : 'Selecione uma opção'},
                placeholderBusca='Buscar vacina...',
                urlBusca='/lote/pesquisarvacina',
                isValidado=true)}"></div>
        </div>
      </div>

      <div class="flex">
        <div class="flex-1 mr-10">
          <div th:replace="~{components/forms :: inputNumero(
            textoLabel='Número de Doses', 
            nomeAtributo='nroDosesDoLote',
            showGroups=true,
            isValidado=true)}"></div>
        </div>
        <div class="flex-1">
          <div th:replace="~{components/forms :: inputNumero(
            textoLabel='Número de Doses Atual', 
            nomeAtributo='nroDosesAtual',
            showGroups=true,
            isValidado=true)}"></div>
          </div>
        </div>
      </div>

      <button type="submit"
        class="mt-8 py-3 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-100 text-blue-800 hover:bg-blue-200 focus:outline-none focus:bg-blue-200 disabled:opacity-50 disabled:pointer-events-none">Cadastrar</button>
    </form>

  </main>
  <!-- !conteudo principal -->
</body>

</html>
