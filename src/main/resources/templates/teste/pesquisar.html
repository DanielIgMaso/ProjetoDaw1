<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org" layout:decorate="~{layout/layoutpadrao}" >

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>Pesquisar Teste</title>
</head>

<body>
  <!-- conteudo principal -->
  <main layout:fragment="conteudo" th:fragment="formulario" id="main" class="flex flex-col align-middle w-full m-10">

    <h3>Input Simples - Pesquisa - Não precisa receber um objeto do model</h3>
    
    <form th:hx-post="@{/teste/pesquisar}" class="w-1/2 mt-10 ms-16">
    
      <div th:replace="~{components/forms :: inputTexto(
        textoLabel='Nome', 
        nomeAtributo='nome')}"></div>

      <div th:replace="~{components/forms :: inputEmail(
        textoLabel='E-mail', 
        nomeAtributo='email')}"></div>

      <div th:replace="~{components/forms :: inputSenha(
        textoLabel='Senha', 
        nomeAtributo='senha')}"></div>

      <div th:replace="~{components/forms :: inputCpf(
        textoLabel='CPF', 
        nomeAtributo='cpf')}"></div>

      <div th:replace="~{components/forms :: inputDinheiro(
        textoLabel='Salário', 
        nomeAtributo='valor')}"></div>

      <div th:replace="~{components/forms :: inputData(
        textoLabel='Nascimento', 
        nomeAtributo='data')}"></div>

      <div th:replace="~{components/forms :: inputHora(
        textoLabel='Hora', 
        nomeAtributo='hora')}"></div>

      <div th:replace="~{components/forms :: inputNumero(
        textoLabel='Quantidade', 
        nomeAtributo='qtd',
        showGroups=true)}"></div>

      <div th:replace="~{components/forms :: inputNumero(
        textoLabel='Peso (Kg)', 
        nomeAtributo='peso',
        isDecimal=true,
        showGroups=false)}"></div>

      <div th:replace="~{components/forms :: inputTextArea(
        textoLabel='Observações', 
        nomeAtributo='observacao')}"></div>

      <div th:with="valoresEnum=${T(web.controlevacinacao.model.Opcoes).values()}">
        <div th:replace="~{components/forms :: checkboxMultiplo(
          textoLabelGroup='Escolha as opções', 
          nomeAtributo='opcoes',
          listaOpcoes=${valoresEnum}, 
          propLabel='descricao')}">
        </div>
      </div>

      <div th:with="valoresEnum=${T(web.controlevacinacao.model.Opcoes).values()}">
        <div th:replace="~{components/forms :: inputRadio(
          textoLabelGroup='Escolha uma Opção', 
          nomeAtributo='opcao',
          listaOpcoes=${valoresEnum}, 
          propLabel='descricao')}">
        </div>
      </div>
    
      <button type="submit" class="mt-7 py-3 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-100 text-blue-800 hover:bg-blue-200 focus:outline-none focus:bg-blue-200 disabled:opacity-50 disabled:pointer-events-none">Pesquisar</button>
    </form>

  </main>
  <!-- !conteudo principal -->

  <!-- Nao usamos
	<th:block layout:fragment="scripts">
		<script src="../static/js/index.js" th:src="@{/js/index.js}"></script>
	</th:block> -->
</body>

</html>
