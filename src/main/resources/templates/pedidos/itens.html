<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org" layout:decorate="~{layout/layoutpadrao}">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Itens do Pedido</title>
</head>

<body>
<!-- conteudo principal: primeira carga da pagina -->
<main layout:fragment="conteudo" th:fragment="pagina" id="main" class="flex flex-col align-middle w-full m-10">

    <div id="itens-pedido-container" class="w-full">
        <th:block th:replace="~{::listaItens}"></th:block>
    </div>

</main>
<!-- !conteudo principal -->

<!-- fragmento reutilizado pelo HTMX a cada adicionar/remover item -->
<th:block th:fragment="listaItens">
    <div class="ms-16 me-16">

        <h1 class="text-xl md:text-2xl">Pedido #<span th:text="${pedido.codigo}"></span></h1>
        <p class="text-gray-600 mt-1">
            Cliente: <span th:text="${pedido.cliente.nome}" class="font-medium"></span> —
            Data: <span th:text="${{pedido.data}}" class="font-medium"></span>
        </p>

        <!-- Formulário de adicionar item -->
        <form th:hx-post="@{/itempedido/cadastrar}" th:hx-target="'#itens-pedido-container'" th:hx-swap="innerHTML"
              th:object="${itemDoPedidoDTOInput}" class="w-2/3 mt-6 flex items-end gap-6">

            <input type="hidden" th:name="pedido" th:value="${pedido.codigo}" />

            <div class="flex-1">
                <div th:replace="~{components/forms :: inputBuscavel(
                textoLabel='Produto',
                nomeAtributo='produto',
                valorAtributo=-1,
                textoAtributo='Selecione uma opção',
                placeholderBusca='Buscar produto...',
                urlBusca='/itempedido/pesquisarproduto',
                isValidado=true)}"></div>
            </div>

            <div class="w-32">
                <div th:replace="~{components/forms :: inputNumero(
                textoLabel='Quantidade',
                nomeAtributo='quantidade',
                isValidado=true)}"></div>
            </div>

            <button type="submit"
                    class="mb-6 py-3 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-100 text-blue-800 hover:bg-blue-200 focus:outline-none focus:bg-blue-200 disabled:opacity-50 disabled:pointer-events-none">Adicionar item</button>
        </form>

        <!-- Tabela de itens já adicionados -->
        <div class="mt-8" th:if="${not #lists.isEmpty(itens)}">
            <div class="border rounded-xl overflow-hidden shadow w-2/3">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                    <tr>
                        <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase">Produto</th>
                        <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase">Qtd</th>
                        <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase">Preço Unit.</th>
                        <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase">Subtotal</th>
                        <th scope="col" class="px-6 py-3 text-end text-xs font-medium text-gray-500 uppercase">Ação</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${itens}" class="odd:bg-white even:bg-gray-100 hover:bg-gray-200">
                        <td th:text="${item.produto.nome}" class="px-6 py-4 whitespace-nowrap text-sm text-gray-800"></td>
                        <td th:text="${item.quantidade}" class="px-6 py-4 whitespace-nowrap text-sm text-gray-800"></td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(item.produto.preco, 1, 2, 'POINT').replace('.', ',')}" class="px-6 py-4 whitespace-nowrap text-sm text-gray-800"></td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(item.produto.preco * item.quantidade, 1, 2, 'POINT').replace('.', ',')}" class="px-6 py-4 whitespace-nowrap text-sm text-gray-800"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                            <a th:hx-get="@{/itempedido/remover/{codigo}/pedido/{codigoPedido}(codigo=${item.codigo}, codigoPedido=${pedido.codigo})}"
                               th:hx-target="'#itens-pedido-container'" th:hx-swap="innerHTML"
                               th:hx-confirm="${'Você vai remover o item ' + item.produto.nome + '!'}"
                               class="cursor-pointer text-red-600 hover:text-red-500 decoration-2 hover:underline focus:outline-hidden focus:underline">Remover</a>
                        </td>
                    </tr>
                    </tbody>
                    <tfoot>
                    <tr class="bg-gray-50">
                        <td colspan="3" class="px-6 py-4 text-end text-sm font-semibold text-gray-700">Total</td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(total, 1, 2, 'POINT').replace('.', ',')}" class="px-6 py-4 text-sm font-semibold text-gray-900"></td>
                        <td></td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <p th:if="${#lists.isEmpty(itens)}" class="mt-8 text-gray-500 italic">Nenhum item adicionado a este pedido ainda.</p>

    </div>
</th:block>

</body>

</html>
