<!DOCTYPE html>
<html lang="pt-BR" layout:decorate="~{layout/layoutpadrao}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Pesquisa de Pedidos</title>
</head>

<body>
<main layout:fragment="conteudo" th:fragment="tabela" id="main" class="flex flex-col align-middle w-full m-10">

    <h1 th:if="${pagina.vazia}" class="text-2xl md:text-4xl text-center">A pesquisa não retornou pedidos</h1>

    <div th:if="${not pagina.vazia}" class="flex flex-col ml-10 mr-10 mt-5">
        <div class="overflow-x-auto">
            <div class="min-w-full inline-block align-middle">
                <div class="border rounded-xl overflow-hidden shadow">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                        <tr>
                            <th:block th:replace="~{components/paginacao :: coluna(${pagina}, 'codigo', 'Código', '')}"></th:block>
                            <th:block th:replace="~{components/paginacao :: coluna(${pagina}, 'data', 'Data', '')}"></th:block>
                            <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase">Cliente</th>
                            <th scope="col" colspan="2" class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Ação</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="pedido : ${pagina.conteudo}" class="odd:bg-white even:bg-gray-100 hover:bg-gray-200">
                            <td th:text="${pedido.codigo}" class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">1</td>
                            <td th:text="${{pedido.data}}" class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">01/01/2026</td>
                            <td th:text="${pedido.cliente.nome}" class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">João</td>
                            <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                                <a th:href="@{/pedido/{codigo}/itens(codigo = ${pedido.codigo})}" class="cursor-pointer text-blue-600 hover:text-blue-500 decoration-2 hover:underline focus:outline-hidden focus:underline">Ver itens</a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                                <a th:hx-get="@{/pedido/remover/{codigo}(codigo = ${pedido.codigo})}" th:hx-confirm="${'Você vai remover o pedido ' + pedido.codigo + '!'}" class="cursor-pointer text-red-600 hover:text-red-500 decoration-2 hover:underline focus:outline-hidden focus:underline">Remover</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div th:replace="~{components/paginacao :: paginacao(${pagina})}"></div>
            </div>
        </div>
    </div>

</main>
</body>

</html>
